# Development overrides
# Run with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# This file EXTENDS docker-compose.yml — only overrides what's different

version: "3.9"

services:

  user_service:
    build:
      context: ./services/user_service
      dockerfile: Dockerfile
    volumes:
      # mount source code into container
      # code changes reflect immediately without rebuilding image
      - ./services/user_service/app:/app/app
    environment:
      DEBUG: "true"
      APP_ENV: development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"   # expose in dev so you can hit service directly


  chef_service:
    volumes:
      - ./services/chef_service/app:/app/app
    environment:
      DEBUG: "true"
      APP_ENV: development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload
    ports:
      - "8002:8002"


