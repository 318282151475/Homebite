# Redis configuration for HomeBite

# persistence — save to disk every 60 seconds if at least 1 key changed
save 60 1

# max memory — prevent Redis consuming all available RAM
maxmemory 256mb

# eviction policy — when memory is full, remove least recently used keys
# allkeys-lru is best for caching use case
maxmemory-policy allkeys-lru

# disable dangerous commands in production
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""

# log level
loglevel notice