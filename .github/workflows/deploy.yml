name: HomeBite CI/CD Pipeline

on:
  push:
    branches: [main]

# Added this section
permissions:
  contents: write    # allows pipeline to commit and push back to repo

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — BUILD AND PUSH ALL SERVICES
  # Runs all 6 services in parallel using matrix strategy
  # Each service gets two tags:
  #   1. latest — for easy reference
  #   2. commit SHA — for traceability and rollback
  # ─────────────────────────────────────────

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: user-service
            context: ./services/user_service
          - name: chef-service
            context: ./services/chef_service
          - name: order-service
            context: ./services/order_service
          - name: delivery-service
            context: ./services/delivery_service
          - name: notification-service
            context: ./services/notification_service
          - name: logging-service
            context: ./services/logging_service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          dockerfile: ${{ matrix.service.context }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/homebite-${{ matrix.service.name }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/homebite-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 2 — BUILD AND PUSH NGINX
  # Nginx is separate because it needs frontend/index.html
  # copied into nginx/ folder before building
  # ─────────────────────────────────────────

  build-nginx:
    name: Build and Push Nginx
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy frontend into nginx folder
        run: cp frontend/index.html nginx/index.html

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          dockerfile: ./nginx/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/homebite-nginx:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/homebite-nginx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 3 — UPDATE K8S MANIFESTS
  # Runs after Job 1 and Job 2 complete
  # Updates all deployment files with new commit SHA tag
  # Commits updated manifests back to repo (GitOps pattern)
  # ─────────────────────────────────────────

  update-manifests:
    name: Update Kubernetes Manifests
    runs-on: ubuntu-latest
    needs: [build-and-push, build-nginx]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in deployment files
        run: |
          sed -i "s|${{ secrets.DOCKERHUB_USERNAME }}/homebite-user-service:.*|${{ secrets.DOCKERHUB_USERNAME }}/homebite-user-service:${{ github.sha }}|g" k8s/deployments/user-service-deployment.yaml
          sed -i "s|${{ secrets.DOCKERHUB_USERNAME }}/homebite-chef-service:.*|${{ secrets.DOCKERHUB_USERNAME }}/homebite-chef-service:${{ github.sha }}|g" k8s/deployments/chef-service-deployment.yaml
          sed -i "s|${{ secrets.DOCKERHUB_USERNAME }}/homebite-order-service:.*|${{ secrets.DOCKERHUB_USERNAME }}/homebite-order-service:${{ github.sha }}|g" k8s/deployments/order-service-deployment.yaml
          sed -i "s|${{ secrets.DOCKERHUB_USERNAME }}/homebite-delivery-service:.*|${{ secrets.DOCKERHUB_USERNAME }}/homebite-delivery-service:${{ github.sha }}|g" k8s/deployments/delivery-service-deployment.yaml
          sed -i "s|${{ secrets.DOCKERHUB_USERNAME }}/homebite-notification-service:.*|${{ secrets.DOCKERHUB_USERNAME }}/homebite-notification-service:${{ github.sha }}|g" k8s/deployments/notification-service-deployment.yaml
          sed -i "s|${{ secrets.DOCKERHUB_USERNAME }}/homebite-logging-service:.*|${{ secrets.DOCKERHUB_USERNAME }}/homebite-logging-service:${{ github.sha }}|g" k8s/deployments/logging-service-deployment.yaml
          sed -i "s|${{ secrets.DOCKERHUB_USERNAME }}/homebite-nginx:.*|${{ secrets.DOCKERHUB_USERNAME }}/homebite-nginx:${{ github.sha }}|g" k8s/deployments/nginx-deployment.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k8s/deployments/
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push

