name: CD — Deploy to Kubernetes

# Only runs on push to main
# i.e. when a PR is merged
on:
  push:
    branches: [main]

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Build and Push Images
  # ─────────────────────────────────────────
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          # DOCKERHUB_TOKEN is a GitHub Actions secret
          # Set in: GitHub repo → Settings → Secrets and variables → Actions
          # Never hardcode credentials in YAML files — ever
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push user_service
        uses: docker/build-push-action@v5
        with:
          context: ./services/user_service
          push: true    # CD pushes to registry — CI does not
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/homebite-user-service:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/homebite-user-service:latest
          # Two tags:
          # 1. commit SHA — immutable, exact version, used for rollback
          # 2. latest — convenience tag, always points to newest
          # In production you deploy with SHA tag, never latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push chef_service
        uses: docker/build-push-action@v5
        with:
          context: ./services/chef_service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/homebite-chef-service:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/homebite-chef-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push order_service
        uses: docker/build-push-action@v5
        with:
          context: ./services/order_service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/homebite-order-service:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/homebite-order-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push delivery_service
        uses: docker/build-push-action@v5
        with:
          context: ./services/delivery_service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/homebite-delivery-service:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/homebite-delivery-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push notification_service
        uses: docker/build-push-action@v5
        with:
          context: ./services/notification_service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/homebite-notification-service:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/homebite-notification-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push logging_service
        uses: docker/build-push-action@v5
        with:
          context: ./services/logging_service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/homebite-logging-service:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/homebite-logging-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ─────────────────────────────────────────
  # JOB 2: Deploy to Kubernetes
  # Runs only after images are pushed
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configure kubectl
        # KUBE_CONFIG is the base64 encoded kubeconfig file
        # Get it with: cat ~/.kube/config | base64
        # Store in GitHub Secrets
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Update image tags in deployments
        # Replace "latest" with exact commit SHA
        # This ensures Kubernetes pulls the exact image we just built
        # and enables precise rollback to any previous commit
        run: |
          kubectl set image deployment/user-service \
            user-service=${{ secrets.DOCKERHUB_USERNAME }}/homebite-user-service:${{ github.sha }} \
            -n homebite

          kubectl set image deployment/chef-service \
            chef-service=${{ secrets.DOCKERHUB_USERNAME }}/homebite-chef-service:${{ github.sha }} \
            -n homebite

          kubectl set image deployment/order-service \
            order-service=${{ secrets.DOCKERHUB_USERNAME }}/homebite-order-service:${{ github.sha }} \
            -n homebite

          kubectl set image deployment/delivery-service \
            delivery-service=${{ secrets.DOCKERHUB_USERNAME }}/homebite-delivery-service:${{ github.sha }} \
            -n homebite

          kubectl set image deployment/notification-service \
            notification-service=${{ secrets.DOCKERHUB_USERNAME }}/homebite-notification-service:${{ github.sha }} \
            -n homebite

          kubectl set image deployment/logging-service \
            logging-service=${{ secrets.DOCKERHUB_USERNAME }}/homebite-logging-service:${{ github.sha }} \
            -n homebite

      - name: Wait for rollout
        # Wait for each deployment to finish rolling update
        # If rollout fails, this step fails and pipeline is marked red
        run: |
          kubectl rollout status deployment/user-service -n homebite --timeout=120s
          kubectl rollout status deployment/chef-service -n homebite --timeout=120s
          kubectl rollout status deployment/order-service -n homebite --timeout=120s
          kubectl rollout status deployment/delivery-service -n homebite --timeout=120s
          kubectl rollout status deployment/notification-service -n homebite --timeout=120s
          kubectl rollout status deployment/logging-service -n homebite --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n homebite
          kubectl get deployments -n homebite

      - name: Rollback on failure
        # This step only runs if previous steps failed
        # Automatically rolls back all deployments to previous version
        if: failure()
        run: |
          kubectl rollout undo deployment/user-service -n homebite
          kubectl rollout undo deployment/chef-service -n homebite
          kubectl rollout undo deployment/order-service -n homebite
          kubectl rollout undo deployment/delivery-service -n homebite
          kubectl rollout undo deployment/notification-service -n homebite
          kubectl rollout undo deployment/logging-service -n homebite
          echo "Rollback completed due to deployment failure"