limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

server {
    listen 80;
    server_name localhost;

    resolver 10.96.0.10 valid=30s ipv6=off;
    resolver_timeout 5s;

    client_max_body_size 10m;
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    location = /auth/verify {
        internal;
        set $upstream_user http://user-service.homebite.svc.cluster.local:8001;
        proxy_pass $upstream_user/api/v1/users/internal/verify-token;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization;
    }

    location = /api/v1/users/register {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
        set $upstream_user http://user-service.homebite.svc.cluster.local:8001;
        proxy_pass $upstream_user;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location = /api/v1/users/login {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
        set $upstream_user http://user-service.homebite.svc.cluster.local:8001;
        proxy_pass $upstream_user;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location = /api/v1/users/refresh {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;
        set $upstream_user http://user-service.homebite.svc.cluster.local:8001;
        proxy_pass $upstream_user;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/v1/users/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        auth_request /auth/verify;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_role $upstream_http_x_user_role;
        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Role $user_role;
        set $upstream_user http://user-service.homebite.svc.cluster.local:8001;
        proxy_pass $upstream_user;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/v1/chefs/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        auth_request /auth/verify;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_role $upstream_http_x_user_role;
        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Role $user_role;
        set $upstream_chef http://chef-service.homebite.svc.cluster.local:8002;
        proxy_pass $upstream_chef;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/v1/orders/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        auth_request /auth/verify;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_role $upstream_http_x_user_role;
        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Role $user_role;
        set $upstream_order http://order-service.homebite.svc.cluster.local:8003;
        proxy_pass $upstream_order;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/v1/deliveries/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        auth_request /auth/verify;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_role $upstream_http_x_user_role;
        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Role $user_role;
        set $upstream_delivery http://delivery-service.homebite.svc.cluster.local:8004;
        proxy_pass $upstream_delivery;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/v1/logs/ {
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;
        auth_request /auth/verify;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_role $upstream_http_x_user_role;
        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Role $user_role;
        set $upstream_logging http://logging-service.homebite.svc.cluster.local:8006;
        proxy_pass $upstream_logging;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location = /health/users {
        set $upstream_user http://user-service.homebite.svc.cluster.local:8001;
        proxy_pass $upstream_user/health;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location = /health/chefs {
        set $upstream_chef http://chef-service.homebite.svc.cluster.local:8002;
        proxy_pass $upstream_chef/health;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location = /health/orders {
        set $upstream_order http://order-service.homebite.svc.cluster.local:8003;
        proxy_pass $upstream_order/health;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location = /health/deliveries {
        set $upstream_delivery http://delivery-service.homebite.svc.cluster.local:8004;
        proxy_pass $upstream_delivery/health;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location = /health/notifications {
        set $upstream_notif http://notification-service.homebite.svc.cluster.local:8005;
        proxy_pass $upstream_notif/health;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location = /health/logs {
        set $upstream_logging http://logging-service.homebite.svc.cluster.local:8006;
        proxy_pass $upstream_logging/health;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location /api/v1/users/internal/ {
        return 403;
    }

    error_page 429 /errors/429.json;
    error_page 401 /errors/401.json;
    error_page 403 /errors/403.json;
    error_page 502 /errors/502.json;

    location /errors/ {
        internal;
        root /etc/nginx;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}