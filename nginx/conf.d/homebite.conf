# --- Rate Limiting Zones ---
# Defined in http block, used in location blocks
# zone=name:size — shared memory zone name and size
# rate — max requests per second per key

# General API rate limit — 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Auth endpoints stricter — 5 requests/minute per IP
# Prevents brute force login attacks
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;


# --- Upstream Blocks ---
# Defines backend service addresses
# In Docker Compose, service names resolve automatically
# In Kubernetes, these would be ClusterIP service names

upstream user_service {
    server user_service:8001;
    keepalive 32;  # maintain 32 persistent connections to upstream
}

upstream chef_service {
    server chef_service:8002;
    keepalive 32;
}

upstream order_service {
    server order_service:8003;
    keepalive 32;
}

upstream delivery_service {
    server delivery_service:8004;
    keepalive 32;
}

upstream notification_service {
    server notification_service:8005;
    keepalive 32;
}

upstream logging_service {
    server logging_service:8006;
    keepalive 32;
}


# --- Main Server Block ---
server {
    listen 80;
    server_name localhost;

    # max request body size — important for file uploads
    client_max_body_size 10m;

    # timeouts — prevents slow client attacks
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # --- JWT Auth Subrequest ---
    # auth_request sends an internal subrequest to user_service
    # before forwarding any protected request
    # If user_service returns 200 → request is forwarded
    # If user_service returns 401 → Nginx returns 401 to client immediately
    # Your FastAPI services never handle invalid tokens — Nginx blocks them
    location = /auth/verify {
        internal;  # only callable internally, not from outside
        proxy_pass http://user_service/api/v1/users/internal/verify-token;
        proxy_pass_request_body off;  # no need to send body for auth check
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization;
    }


    # --- Public Routes (no JWT required) ---

    # User registration and login — public
    location /api/v1/users/register {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://user_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/v1/users/login {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://user_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/v1/users/refresh {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://user_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }


    # --- Protected Routes (JWT required) ---

    # User service — protected
    location /api/v1/users/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        auth_request /auth/verify;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_role $upstream_http_x_user_role;

        # pass verified user info to backend as headers
        # backend services trust these headers — they come from Nginx, not client
        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Role $user_role;

        proxy_pass http://user_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Chef service — protected
    location /api/v1/chefs/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        auth_request /auth/verify;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_role $upstream_http_x_user_role;

        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Role $user_role;

        proxy_pass http://chef_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Order service — protected
    location /api/v1/orders/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        auth_request /auth/verify;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_role $upstream_http_x_user_role;

        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Role $user_role;

        proxy_pass http://order_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Delivery service — protected
    location /api/v1/deliveries/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        auth_request /auth/verify;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_role $upstream_http_x_user_role;

        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Role $user_role;

        proxy_pass http://delivery_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Logging service — admin only in production
    # For now protected by JWT only
    location /api/v1/logs/ {
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        auth_request /auth/verify;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_role $upstream_http_x_user_role;

        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Role $user_role;

        proxy_pass http://logging_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }


    # --- Health Checks ---
    # Kubernetes liveness probes hit these
    # No auth required — infrastructure needs these to always work
    location /health/users {
        proxy_pass http://user_service/health;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /health/chefs {
        proxy_pass http://chef_service/health;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /health/orders {
        proxy_pass http://order_service/health;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /health/deliveries {
        proxy_pass http://delivery_service/health;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /health/notifications {
        proxy_pass http://notification_service/health;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /health/logs {
        proxy_pass http://logging_service/health;
        include /etc/nginx/conf.d/proxy_params.conf;
    }


    # --- Block internal endpoints from outside ---
    # /internal/* routes must never be reachable from client
    # Only Nginx itself can call them via auth_request
    location /api/v1/users/internal/ {
        return 403;
    }


    # --- Error Pages ---
    error_page 429 /errors/429.json;
    error_page 401 /errors/401.json;
    error_page 403 /errors/403.json;
    error_page 502 /errors/502.json;

    location /errors/ {
        internal;
        root /etc/nginx;
    }
}