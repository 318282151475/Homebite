# Shared proxy settings — included in every location block
# Keeps homebite.conf clean and DRY

proxy_http_version 1.1;

# required for keepalive connections to upstream
proxy_set_header Connection "";

# pass real client IP to backend services
# without this, backend sees Nginx IP, not client IP
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Host $host;

# timeouts
proxy_connect_timeout 10s;   # time to connect to upstream
proxy_send_timeout 30s;      # time to send request to upstream
proxy_read_timeout 30s;      # time to wait for upstream response

# buffer settings
# if upstream response fits in buffer, Nginx doesn't write to disk
proxy_buffering on;
proxy_buffer_size 4k;
proxy_buffers 8 4k;