# main nginx.conf — global settings

user nginx;

# worker_processes auto = Nginx creates one worker per CPU core
# On a 4-core machine = 4 workers
# Each worker handles thousands of connections concurrently
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    # max simultaneous connections per worker
    # total connections = worker_processes * worker_connections
    # 4 workers * 1024 = 4096 simultaneous connections
    worker_connections 1024;

    # epoll = Linux kernel's most efficient I/O event notification
    # handles thousands of connections without polling each one
    use epoll;

    # accept multiple connections at once instead of one at a time
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # log format includes request time and upstream response time
    # essential for performance monitoring
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # sendfile = OS handles file transfer directly, bypasses userspace
    # faster static file serving
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # close idle connections after 65 seconds
    keepalive_timeout 65;

    # hide nginx version from response headers — security best practice
    # attacker cannot target known vulnerabilities of specific version
    server_tokens off;

    # enable gzip compression
    # reduces response size by ~70% for JSON responses
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1000;

    # include all service-specific configs
    include /etc/nginx/conf.d/*.conf;
}