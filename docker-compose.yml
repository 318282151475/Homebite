services:

  # ─────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: homebite_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql:/docker-entrypoint-initdb.d
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  redis:
    image: redis:7.2-alpine
    container_name: homebite_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: homebite_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "30"]
      interval: 10s
      timeout: 35s
      retries: 5
      start_period: 20s


  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: homebite_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 1048576
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - homebite_network
    healthcheck:
      test: [ "CMD", "cub", "kafka-ready", "-b", "localhost:9092", "1", "30" ]
      interval: 15s
      timeout: 35s
      retries: 5
      start_period: 40s


  kafka_init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: homebite_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infra/kafka/create_topics.sh:/create_topics.sh
    entrypoint: ["/bin/bash", "/create_topics.sh"]
    networks:
      - homebite_network


  # ─────────────────────────────────────────
  # APPLICATION SERVICES
  # ─────────────────────────────────────────

  user_service:
    build:
      context: ./services/user_service
      dockerfile: Dockerfile
    container_name: homebite_user_service
    restart: unless-stopped
    env_file:
      - ./services/user_service/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka_init:
        condition: service_completed_successfully
    ports:
      - "8001:8001"
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s


  chef_service:
    build:
      context: ./services/chef_service
      dockerfile: Dockerfile
    container_name: homebite_chef_service
    restart: unless-stopped
    env_file:
      - ./services/chef_service/.env
    depends_on:
      mysql:
        condition: service_healthy
      kafka_init:
        condition: service_completed_successfully
    ports:
      - "8002:8002"
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s


  order_service:
    build:
      context: ./services/order_service
      dockerfile: Dockerfile
    container_name: homebite_order_service
    restart: unless-stopped
    env_file:
      - ./services/order_service/.env
    depends_on:
      mysql:
        condition: service_healthy
      kafka_init:
        condition: service_completed_successfully
    ports:
      - "8003:8003"
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s


  delivery_service:
    build:
      context: ./services/delivery_service
      dockerfile: Dockerfile
    container_name: homebite_delivery_service
    restart: unless-stopped
    env_file:
      - ./services/delivery_service/.env
    depends_on:
      mysql:
        condition: service_healthy
      kafka_init:
        condition: service_completed_successfully
    ports:
      - "8004:8004"
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s


  notification_service:
    build:
      context: ./services/notification_service
      dockerfile: Dockerfile
    container_name: homebite_notification_service
    restart: unless-stopped
    env_file:
      - ./services/notification_service/.env
    depends_on:
      kafka_init:
        condition: service_completed_successfully
    ports:
      - "8005:8005"
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s


  logging_service:
    build:
      context: ./services/logging_service
      dockerfile: Dockerfile
    container_name: homebite_logging_service
    restart: unless-stopped
    env_file:
      - ./services/logging_service/.env
    depends_on:
      mysql:
        condition: service_healthy
      kafka_init:
        condition: service_completed_successfully
    ports:
      - "8006:8006"
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s


  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: homebite_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - homebite_network


  # ─────────────────────────────────────────
  # OBSERVABILITY
  # ─────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: homebite_prometheus
    restart: unless-stopped
    ports:
      - "9200:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - homebite_network


  grafana:
    image: grafana/grafana:10.4.0
    container_name: homebite_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - homebite_network

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: homebite_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    networks:
      - homebite_network
    depends_on:
      mysql:
        condition: service_healthy


# ─────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────

networks:
  homebite_network:
    driver: bridge


# ─────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────

volumes:
  mysql_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  prometheus_data:
  grafana_data: