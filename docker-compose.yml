version: "3.9"

services:

  # ─────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: homebite_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: homebite
      MYSQL_PASSWORD: homebite123
    ports:
      - "3306:3306"       # exposed for local DB tools like DBeaver
    volumes:
      - mysql_data:/var/lib/mysql                 # persist data across restarts
      - ./infra/mysql:/docker-entrypoint-initdb.d  # runs all .sql files on first start
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  redis:
    image: redis:7.2-alpine
    container_name: homebite_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: homebite_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5


  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: homebite_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT_HOST allows local tools to connect via localhost:9094
      # PLAINTEXT is used internally between containers
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"   # we create topics explicitly
      KAFKA_LOG_RETENTION_HOURS: 168             # keep events for 7 days
      KAFKA_MESSAGE_MAX_BYTES: 1048576           # 1MB max message size
    ports:
      - "9094:9094"     # for local Kafka tools like Offset Explorer
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s


  kafka_init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: homebite_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infra/kafka/create_topics.sh:/create_topics.sh
    entrypoint: ["/bin/bash", "/create_topics.sh"]
    networks:
      - homebite_network
    # restart: no — runs once and exits
    # This is intentional — topic creation is one-time setup


  # ─────────────────────────────────────────
  # SERVICES
  # ─────────────────────────────────────────

  user_service:
    build:
      context: ./services/user_service
      dockerfile: Dockerfile
    container_name: homebite_user_service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_NAME: user_service
      APP_PORT: 8001
      DEBUG: "false"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: user_db
      DB_USER: root
      DB_PASSWORD: secret
      JWT_SECRET_KEY: supersecretjwtkey_change_in_production
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_USER_REGISTERED: user.registered
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s


  chef_service:
    build:
      context: ./services/chef_service
      dockerfile: Dockerfile
    container_name: homebite_chef_service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka_init:
        condition: service_completed_successfully
    environment:
      APP_ENV: production
      APP_NAME: chef_service
      APP_PORT: 8002
      DEBUG: "false"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: chef_db
      DB_USER: root
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 1
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_ORDER_CREATED: order.created
      KAFKA_TOPIC_CHEF_ASSIGNED: chef.assigned
      KAFKA_CONSUMER_GROUP: chef-service-group
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s


  order_service:
    build:
      context: ./services/order_service
      dockerfile: Dockerfile
    container_name: homebite_order_service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka_init:
        condition: service_completed_successfully
    environment:
      APP_ENV: production
      APP_NAME: order_service
      APP_PORT: 8003
      DEBUG: "false"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: order_db
      DB_USER: root
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 2
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_ORDER_CREATED: order.created
      KAFKA_TOPIC_CHEF_ASSIGNED: chef.assigned
      KAFKA_TOPIC_DELIVERY_STARTED: delivery.started
      KAFKA_TOPIC_DELIVERY_COMPLETED: delivery.completed
      KAFKA_CONSUMER_GROUP: order-service-group
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s


  delivery_service:
    build:
      context: ./services/delivery_service
      dockerfile: Dockerfile
    container_name: homebite_delivery_service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka_init:
        condition: service_completed_successfully
    environment:
      APP_ENV: production
      APP_NAME: delivery_service
      APP_PORT: 8004
      DEBUG: "false"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: delivery_db
      DB_USER: root
      DB_PASSWORD: secret
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_CHEF_ASSIGNED: chef.assigned
      KAFKA_TOPIC_DELIVERY_STARTED: delivery.started
      KAFKA_TOPIC_DELIVERY_COMPLETED: delivery.completed
      KAFKA_CONSUMER_GROUP: delivery-service-group
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s


  notification_service:
    build:
      context: ./services/notification_service
      dockerfile: Dockerfile
    container_name: homebite_notification_service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka_init:
        condition: service_completed_successfully
    environment:
      APP_ENV: production
      APP_NAME: notification_service
      APP_PORT: 8005
      DEBUG: "false"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_USER_REGISTERED: user.registered
      KAFKA_TOPIC_ORDER_CREATED: order.created
      KAFKA_TOPIC_CHEF_ASSIGNED: chef.assigned
      KAFKA_TOPIC_DELIVERY_STARTED: delivery.started
      KAFKA_TOPIC_DELIVERY_COMPLETED: delivery.completed
      KAFKA_CONSUMER_GROUP: notification-service-group
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      EMAIL_FROM: noreply@homebite.com
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s


  logging_service:
    build:
      context: ./services/logging_service
      dockerfile: Dockerfile
    container_name: homebite_logging_service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka_init:
        condition: service_completed_successfully
    environment:
      APP_ENV: production
      APP_NAME: logging_service
      APP_PORT: 8006
      DEBUG: "false"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: logging_db
      DB_USER: root
      DB_PASSWORD: secret
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_USER_REGISTERED: user.registered
      KAFKA_TOPIC_ORDER_CREATED: order.created
      KAFKA_TOPIC_CHEF_ASSIGNED: chef.assigned
      KAFKA_TOPIC_DELIVERY_STARTED: delivery.started
      KAFKA_TOPIC_DELIVERY_COMPLETED: delivery.completed
      KAFKA_CONSUMER_GROUP: logging-service-group
    networks:
      - homebite_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s


  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: homebite_nginx
    restart: unless-stopped
    depends_on:
      user_service:
        condition: service_healthy
      chef_service:
        condition: service_healthy
      order_service:
        condition: service_healthy
      delivery_service:
        condition: service_healthy
    ports:
      - "80:80"     # only port exposed to host machine
    networks:
      - homebite_network

  # ─────────────────────────────────────────
  # OBSERVABILITY
  # ─────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: homebite_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"   # Prometheus UI — localhost:9090
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      # keep metrics for 15 days
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"  # allows config reload without restart
    networks:
      - homebite_network


  grafana:
    image: grafana/grafana:10.4.0
    container_name: homebite_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"   # Grafana UI — localhost:3000
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      # auto-provision datasource and dashboard on startup
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - homebite_network


  # MySQL metrics exporter
  # Connects to MySQL, reads metrics, exposes at :9104/metrics
  mysql_exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: homebite_mysql_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "root:secret@(mysql:3306)/"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - homebite_network


  # Redis metrics exporter
  redis_exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: homebite_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis:6379"
    depends_on:
      - redis
    networks:
      - homebite_network


  # Kafka metrics exporter
  kafka_exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: homebite_kafka_exporter
    restart: unless-stopped
    command:
      - "--kafka.server=kafka:9092"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - homebite_network

# ─────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────

networks:
  homebite_network:
    driver: bridge
    # all containers on this network can reach each other by service name
    # e.g. user_service can reach mysql at host "mysql"
    # nothing outside this network can reach containers directly
    # except ports explicitly published above


# ─────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────

volumes:
  mysql_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  prometheus_data:
  grafana_data:
  # no volume for services — they are stateless
  # state lives in mysql, redis, kafka only