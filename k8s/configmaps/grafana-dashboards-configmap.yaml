apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: monitoring
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        isDefault: true
        editable: true

  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: HomeBite
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

  homebite.json: |
    {
      "title": "HomeBite — System Overview",
      "uid": "homebite-overview",
      "panels": [],
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" }
    }