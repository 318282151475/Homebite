# user-service
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: homebite
spec:
  selector:
    app: user-service     # routes traffic to pods with this label
  ports:
    - protocol: TCP
      port: 8001          # port other services use to call this service
      targetPort: 8001    # port the container is listening on
  type: ClusterIP         # ClusterIP = internal only, not reachable from outside

---
