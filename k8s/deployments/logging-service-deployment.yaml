apiVersion: apps/v1
kind: Deployment
metadata:
  name: logging-service
  namespace: homebite
  labels:
    app: logging-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logging-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: logging-service
    spec:
      containers:
        - name: logging-service
          image: homebite/logging-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8006
          envFrom:
            - configMapRef:
                name: homebite-config
          env:
            - name: APP_NAME
              value: "logging_service"
            - name: APP_PORT
              value: "8006"
            - name: DB_NAME
              value: "logging_db"
            - name: KAFKA_CONSUMER_GROUP
              value: "logging-service-group"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homebite-secrets
                  key: DB_PASSWORD
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: homebite-secrets
                  key: DB_USER
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3