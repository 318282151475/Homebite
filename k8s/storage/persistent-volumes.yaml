# MySQL PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: homebite
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

